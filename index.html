<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Protocol Lab — From tool call to MCP</title>
<meta name="description" content="Derive the protocol yourself. Every crack in the v1 tool call becomes a question, a felt failure, an exercise, and a reveal — until you invent MCP." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23F96846'/><text x='50' y='72' font-size='62' font-family='monospace' font-weight='700' text-anchor='middle' fill='%23fff'>x</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- ============ SIDEBAR ============ -->
<aside id="sidebar" aria-label="Course navigation">
  <div class="brand">
    <button class="brand-logo" id="homeLink" type="button" aria-label="Go to the first step">
      <span class="brand-100">100</span><span class="brand-x">x</span>
    </button>
    <span class="brand-lab">The Protocol Lab</span>
  </div>

  <nav id="moduleNav"></nav>

  <div class="sidebar-foot">
    <button id="resetBtn" class="btn btn--ghost btn--sm"><i data-lucide="rotate-ccw"></i> Reset progress</button>
  </div>
</aside>

<!-- ============ MAIN ============ -->
<main id="main">
  <div class="topbar">
    <button id="menuBtn" class="btn btn--ghost btn--sm only-mobile" type="button" aria-label="Open course navigation" aria-controls="sidebar" aria-expanded="false"><i data-lucide="panel-left"></i></button>
    <div class="topbar-progress" id="progressBar" role="progressbar" aria-label="Progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progressFill"></div></div>
    <div id="progressLabel" class="caption mono"></div>
  </div>

  <div id="stage" tabindex="-1"></div>

  <footer id="stepFooter" class="step-footer">
    <button id="backBtn" class="btn btn--secondary btn--sm"><i data-lucide="arrow-left"></i> Back</button>
    <div id="stepDots" class="step-dots"></div>
    <button id="continueBtn" class="btn btn--primary">Continue <i data-lucide="arrow-right"></i></button>
  </footer>
</main>

<button id="scrim" class="scrim" type="button" aria-label="Close course navigation"></button>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
